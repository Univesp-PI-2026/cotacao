<section class="login-shell">
  <article class="login-card">
    <div class="brand-block">
      <img class="brand-logo" src="/assets/logo-placeholder.svg" alt="Grupo05" />
    </div>

    <form [formGroup]="form" (ngSubmit)="login()" class="form">
      <p class="message error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <label class="field">
        <span class="field-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M4 7.5A1.5 1.5 0 0 1 5.5 6h13A1.5 1.5 0 0 1 20 7.5v9a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 16.5v-9Z"/>
            <path d="M5 7l7 5 7-5" class="icon-cut"/>
          </svg>
        </span>
        <input
          formControlName="identifier"
          type="text"
          autocomplete="username"
          placeholder="E-mail*"
        />
      </label>
      <small class="field-error" *ngIf="showFieldError('identifier')">Este campo e obrigatorio.</small>

      <label class="field password-field">
        <span class="field-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M8 10V8.2C8 5.9 9.8 4 12 4s4 1.9 4 4.2V10"/>
            <rect x="6" y="10" width="12" height="10" rx="2"/>
          </svg>
        </span>
        <div class="password-input-wrap">
          <input
            formControlName="password"
            [type]="showPassword ? 'text' : 'password'"
            autocomplete="current-password"
            placeholder="Senha*"
          />
          <button
            type="button"
            class="password-toggle"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'"
          >
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M2.5 12s3.4-5 9.5-5 9.5 5 9.5 5-3.4 5-9.5 5-9.5-5-9.5-5Z"/>
              <circle cx="12" cy="12" r="2.8"/>
            </svg>
          </button>
        </div>
      </label>
      <small class="field-error" *ngIf="showFieldError('password')">Este campo e obrigatorio.</small>

      <div class="helper-row">
        <span></span>
        <button type="button" class="helper-link">Esqueci a senha</button>
      </div>

      <button class="primary" type="submit" [disabled]="submitting">
        <span class="button-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M13 6l5 6-5 6"/>
            <path d="M6 12h11"/>
          </svg>
        </span>
        {{ submitting ? 'ENTRANDO...' : 'ENTRAR' }}
      </button>

      <p class="register-copy">Novo usuario? <strong>Cadastre-se</strong></p>
    </form>
  </article>
</section>
