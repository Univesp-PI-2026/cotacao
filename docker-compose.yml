services:
  frontend:
    build:
      context: ./frontend
    container_name: ${CONTAINER_PREFIX:-cotacao-v02}-${APP_ENV:-dev}-frontend
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      api:
        condition: service_started
    networks:
      - cotacao-network

  api:
    build:
      context: ./api
    container_name: ${CONTAINER_PREFIX:-cotacao-v02}-${APP_ENV:-dev}-api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      APP_ENV: ${APP_ENV:-dev}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-cotacao_v02}
      DB_USER: ${DB_USER:-cotacao_user}
      DB_PASSWORD: ${DB_PASSWORD:-cotacao_pass}
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: npm run dev
    networks:
      - cotacao-network

  db:
    image: mysql:8.4
    container_name: ${CONTAINER_PREFIX:-cotacao-v02}-${APP_ENV:-dev}-db
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cotacao_v02}
      MYSQL_USER: ${MYSQL_USER:-cotacao_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cotacao_pass}
    volumes:
      - ./database/mysql/data:/data/mysql
      - ./database/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - cotacao-network

  migrate:
    image: flyway/flyway:12.4-alpine
    container_name: ${CONTAINER_PREFIX:-cotacao-v02}-${APP_ENV:-dev}-migrate
    command:
      - -connectRetries=60
      - -baselineOnMigrate=true
      - -validateMigrationNaming=true
      - -locations=filesystem:/flyway/sql/common,filesystem:/flyway/sql/${APP_ENV:-dev}
      - -url=jdbc:mysql://db:3306/${MYSQL_DATABASE:-cotacao_v02}?useSSL=false&allowPublicKeyRetrieval=true
      - -user=${MYSQL_USER:-cotacao_user}
      - -password=${MYSQL_PASSWORD:-cotacao_pass}
      - migrate
    volumes:
      - ./database/migrations:/flyway/sql:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cotacao-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ${CONTAINER_PREFIX:-cotacao-v02}-${APP_ENV:-dev}-phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER:-cotacao_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-cotacao_pass}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cotacao-network

networks:
  cotacao-network:
    driver: bridge
